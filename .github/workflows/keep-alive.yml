name: Keep databases alive

on:
  schedule:
    - cron: "0 3 * * *"  # 3am UTC = 1pm AEST
  workflow_dispatch:       # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iso-compliance-tool-kappa.vercel.app/api/health)
          echo "Production status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping staging
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iso-compliance-tool-git-staging-samzhangaegisys-projects.vercel.app/api/health)
          echo "Staging status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
